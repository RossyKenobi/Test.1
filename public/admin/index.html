<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.1.2/dist/decap-cms.js"></script>
  
  <script>
    window.addEventListener('load', () => {
      // Inject "Sync Instagram" button into Decap CMS header
      const checkInterval = setInterval(() => {
        const header = document.querySelector('[class*="AppHeaderContent"]');
        if (header && !document.getElementById('sync-ig-btn')) {
          const btn = document.createElement('button');
          btn.id = 'sync-ig-btn';
          btn.innerText = 'Sync Instagram';
          btn.style.cssText = 'background: #e11d48; color: white; border: none; padding: 6px 16px; border-radius: 6px; margin-left: 16px; cursor: pointer; font-weight: 600; font-family: system-ui; transition: background 0.2s;';
          
          btn.onmouseover = () => btn.style.background = '#be123c';
          btn.onmouseout = () => btn.style.background = '#e11d48';

          btn.onclick = async () => {
             const token = prompt("Enter your GitHub Personal Access Token to trigger sync:");
             if (!token) return;
             
             btn.innerText = 'Syncing...';
             try {
               // Replace YOUR_USERNAME/YOUR_REPO with actual values later
               const res = await fetch('https://api.github.com/repos/YOUR_USERNAME/YOUR_REPO/actions/workflows/sync-instagram.yml/dispatches', {
                 method: 'POST',
                 headers: {
                   'Accept': 'application/vnd.github.v3+json',
                   'Authorization': `token ${token}`
                 },
                 body: JSON.stringify({ ref: 'main' })
               });
               if (res.ok || res.status === 204) {
                 alert('Sync triggered successfully! It generally takes a minute to fetch and process new images.');
               } else {
                 const err = await res.json();
                 alert('Failed to trigger sync: ' + (err.message || res.statusText));
               }
             } catch(e) {
               alert('Error triggering sync: ' + e.message);
             }
             btn.innerText = 'Sync Instagram';
          };
          
          header.appendChild(btn);
          clearInterval(checkInterval);
        }
      }, 1000);
    });
  </script>
</body>
</html>
